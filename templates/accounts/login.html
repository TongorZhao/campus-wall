{% extends "base/base.html" %}

{% block title %}登录 - 校园墙{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">登录</h3>
                <form method="post" action="{% url 'accounts:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" name="username" id="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">登录</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-muted">还没有账号？</span>
                    <a href="{% url 'accounts:register' %}">立即注册</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
