{% extends "base/base.html" %}

{% block title %}删除帖子 - 校园墙{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
                <h4 class="mt-3">确认删除</h4>
                <p class="text-muted">你确定要删除这篇帖子吗？此操作不可撤销。</p>
                <div class="bg-light rounded p-3 mb-3 text-start">
                    <h6>{{ post.title }}</h6>
                    <small class="text-muted">{{ post.content|truncatechars:100 }}</small>
                </div>
                <div class="d-flex gap-2 justify-content-center">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </form>
                    <a href="{% url 'posts:detail' pk=post.pk %}" class="btn btn-outline-secondary">取消</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
