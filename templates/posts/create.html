{% extends "base/base.html" %}

{% block title %}发帖 - 校园墙{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4">发布新帖</h4>
                <form method="post" enctype="multipart/form-data" id="post-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">标题</label>
                        <input type="text" name="title" id="id_title" class="form-control" required maxlength="200" placeholder="帖子标题">
                    </div>
                    <div class="mb-3">
                        <label for="id_content" class="form-label">内容</label>
                        <textarea name="content" id="id_content" class="form-control" rows="10" required placeholder="在这里写下你想说的话..."></textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="id_category" class="form-label">分类</label>
                            <select name="category" id="id_category" class="form-select">
                                <option value="">-- 选择分类 --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.pk }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="id_anonymity" class="form-label">发布方式</label>
                            <select name="anonymity" id="id_anonymity" class="form-select">
                                <option value="public">公开</option>
                                <option value="anonymous">匿名发布</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">标签</label>
                        <input type="text" name="tags_input" class="form-control" placeholder="多个标签用逗号分隔，例如：表白, 寻物, 二手">
                        <div class="form-text">标签可以帮助其他人更快找到你的帖子</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">图片（可选，最多9张）</label>
                        <div class="row g-2" id="image-preview">
                            {% for form in formset %}
                            <div class="col-6 col-md-3">
                                <div class="border rounded p-2 text-center" style="min-height: 120px;">
                                    {{ form.image }}
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    {{ formset.management_form }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>发布
                        </button>
                        <a href="{% url 'posts:feed' %}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
